<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的遊戲資料庫 - Nerine52</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-10">📚 我的遊戲資料庫</h1>
        
        <div class="grid grid-cols-12 gap-6">
            <!-- 左側分類 -->
            <div class="col-span-3 bg-slate-900 text-white rounded-3xl p-6">
                <h2 class="text-xl font-bold mb-6">分類</h2>
                <div onclick="alert('已選擇 通行證')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer mb-2">通行證</div>
                <div onclick="alert('已選擇 金幣箱')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer mb-2">金幣箱</div>
                <div onclick="alert('已選擇 華仲師兄')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer mb-2">華仲師兄</div>
                <div onclick="alert('已選擇 服裝箱')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer mb-2">服裝箱</div>
                <div onclick="alert('已選擇 福利活動')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer mb-2">福利活動</div>
                <div onclick="alert('已選擇 排行活動')" class="px-6 py-4 hover:bg-slate-800 rounded-2xl cursor-pointer">排行活動</div>
            </div>

            <!-- 右側內容 -->
            <div class="col-span-9 bg-white rounded-3xl shadow p-10">
                <h2 class="text-2xl font-bold mb-6">目前測試版本</h2>
                <p class="text-lg text-slate-600 mb-8">如果您看到這段文字，表示網站已經成功載入。</p>
                
                <button onclick="alert('這是測試按鈕\n\n如果有反應，表示 JavaScript 正常運作')" 
                        class="bg-blue-600 text-white px-8 py-4 rounded-3xl text-lg">
                    點我測試
                </button>
                
                <div class="mt-12 text-sm text-slate-500">
                    如果左側分類可以點擊跳出提示，表示基本功能正常。<br>
                    接下來我會再給你完整版。
                </div>
            </div>
        </div>
    </div>
</body>
</html>
